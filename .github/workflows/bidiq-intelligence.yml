name: BidIQ Intelligence Engine

on:
  schedule:
    # 3:00 PM Pacific Time (PDT) is 22:00 UTC
    - cron: '0 22 * * *'
  workflow_dispatch: # Allows you to run this manually from the Actions tab

jobs:
  run-pipeline:
    runs-on: ubuntu-22.04
    timeout-minutes: 60 # Ensuring enough time for deep scraping and AI analysis

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r agents/requirements.txt

      - name: Install Playwright Chromium
        run: python -m playwright install chromium

      - name: Install Playwright System Dependencies
        run: npx playwright install-deps chromium

      - name: Run Model Diagnostic
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python agents/model_check.py

      - name: Cleanup Old Matches
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          python agents/cleanup_matches.py
      
      - name: Run Intelligence Pipeline
        env:
          # Mapping GitHub Secrets to Environment Variables
          PYTHONPATH: ${{ github.workspace }}/agents
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM_EMAIL: "noreply@strongerbuilt.us"
          ADMIN_EMAIL: "info@strongerbuilt.us"
        run: |
          python agents/run_pipeline.py
